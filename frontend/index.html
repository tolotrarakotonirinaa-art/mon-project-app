<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevEnviron 4D — Plateforme de Développement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    #root { height: 100%; }

    body {
      background: #020408;
      color: #e8f4ff;
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
      line-height: 1.6;
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #020408; }
    ::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.3); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,200,255,0.6); }
    ::selection { background: rgba(0,200,255,0.25); color: #fff; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }

    /* Global resets for inputs/selects/buttons */
    input, textarea, select {
      font-family: 'Rajdhani', sans-serif;
      color: #e8f4ff;
    }
    select option { background: #0a1628; }
    button { font-family: 'Orbitron', sans-serif; }

    /* Drag ghost */
    .drag-ghost { opacity: 0.4 !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
