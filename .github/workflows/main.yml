name: CI/CD mon-project-app

on:
  push:
    branches: [ main ]

jobs:
  deploy-staging:
    name: Build and Deploy to Test (8080)
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          # Hamarino raha misy npm
          npm -v || (sudo apt update && sudo apt install -y nodejs npm)
          npm install
          npm run build --if-present

      - name: Deploy to Staging Folder
        run: |
          # Ity baiko ity no mampiseho ny projet ao amin'ny 8080
          # Ampiasaina ny sudo mba tsy hisy olana amin'ny famafana/fandikana
          sudo rm -rf /var/www/mon-project-app/staging/*
          
          # Raha React (Vite) dia 'dist' ny folder, raha React (CRA) dia 'build'
          if [ -d "dist" ]; then
            sudo cp -r dist/* /var/www/mon-project-app/staging/
          elif [ -d "build" ]; then
            sudo cp -r build/* /var/www/mon-project-app/staging/
          else
            sudo cp index.html /var/www/mon-project-app/staging/
          fi