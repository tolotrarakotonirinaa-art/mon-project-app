name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Simuler la création de l'APK
        run: |
          mkdir -p dist/apk
          echo "APK de test - Lucas" > dist/apk/app-test.apk

      - name: Déploiement vers Nginx
        run: |
          # On vide l'ancien contenu et on copie le nouveau
          sudo rm -rf /var/www/mon-project-app/staging/*
          sudo cp -R . /var/www/mon-project-app/staging/
          
      - name: Permissions
        run: |
          sudo chown -R www-data:www-data /var/www/mon-project-app/staging