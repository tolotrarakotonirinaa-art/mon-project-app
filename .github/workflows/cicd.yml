name: CI/CD Pipeline

on:
  push:
    branches:
      - staging

jobs:

  # ── TEST ──
  deploy-test:
    runs-on: self-hosted
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Déployer sur TEST
        run: |
          mkdir -p /srv/test/releases
          chmod 755 /srv/test/releases
          cp -r $GITHUB_WORKSPACE/releases/* /srv/test/releases/ 2>/dev/null || true
          echo "TEST OK: http://192.168.137.68:8080/releases/"

  # ── VALIDATION AGENT ──
  validation-agent:
    needs: deploy-test
    runs-on: self-hosted
    environment:
      name: agent-approval
    steps:
      - run: echo "Validation TEST OK"

  # ── EXTRACTION ──
  extract:
    needs: validation-agent
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Créer archive
        run: |
          VERSION=$(date +%Y%m%d-%H%M%S)
          mkdir -p /tmp/build
          tar -czf /tmp/build/projet.tar.gz \
            --exclude='.git' \
            -C $GITHUB_WORKSPACE .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: projet-valide
          path: /tmp/build/projet.tar.gz

  # ── CLEAN TEST ──
  cleanup-test:
    needs: extract
    runs-on: self-hosted
    steps:
      - name: Cleanup TEST
        run: |
          rm -rf /srv/test/releases/*
          chmod 000 /srv/test/releases 2>/dev/null || true
          echo "TEST cleaned"

  # ── VALIDATION PROD ──
  validation-chef:
    needs: cleanup-test
    runs-on: self-hosted
    environment:
      name: production-approval
    steps:
      - run: echo "Validation PROD OK"

  # ── DEPLOY PROD ──
  deploy-prod:
    needs: validation-chef
    runs-on: self-hosted
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: projet-valide
          path: /tmp/artifact

      - name: Déployer sur PROD
        run: |
          mkdir -p /srv/releases
          chmod 755 /srv/releases

          tar -xzf /tmp/artifact/projet.tar.gz -C /srv/releases

          echo "PROD OK: http://192.168.137.153/releases/"