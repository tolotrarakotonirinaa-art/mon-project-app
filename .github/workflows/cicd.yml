name: CI/CD Pipeline

on:
  push:
    branches:
      - staging

jobs:

  # ── ÉTAPE 3 : Déploiement TEST ──────────────
  deploy-test:
    runs-on: [self-hosted, runner-test]
    environment: staging
    steps:
      - uses: actions/checkout@v3
      - name: Copier APK vers TEST
        run: |
          chmod 755 /srv/test/releases
          cp -r $GITHUB_WORKSPACE/releases/* /srv/test/releases/ 2>/dev/null || true
          echo "APK visible sur http://192.168.137.68:8080/releases/"

  # ── ÉTAPE 5 : Extraction archive ────────────
  extract:
    needs: deploy-test
    runs-on: [self-hosted, runner-test]
    steps:
      - uses: actions/checkout@v3
      - name: Créer archive du projet validé
        run: |
          VERSION=$(date +%Y%m%d-%H%M%S)
          tar -czf /tmp/projet-v$VERSION.tar.gz \
            --exclude='.git' \
            -C $GITHUB_WORKSPACE .
          echo "Archive créée : projet-v$VERSION.tar.gz"

      - name: Publier archive sur GitHub
        uses: actions/upload-artifact@v3
        with:
          name: projet-valide
          path: /tmp/projet-v*.tar.gz
          retention-days: 30

  # ── ÉTAPE 6 : Approbation manuelle ──────────
  validate:
    needs: extract
    runs-on: [self-hosted, runner-test]
    environment:
      name: production-approval
    steps:
      - run: echo "Chef de projet a approuvé le déploiement"

  # ── ÉTAPE 7 : Déploiement PROD ──────────────
  deploy-prod:
    needs: validate
    runs-on: [self-hosted, tolotra-VirtualBox]
    environment: production
    steps:
      - uses: actions/checkout@v3
      - name: Déployer APK sur PROD
        run: |
          mkdir -p /srv/releases
          cp -r $GITHUB_WORKSPACE/releases/* /srv/releases/ 2>/dev/null || true
          echo "APK visible sur http://192.168.137.153/releases/"

  # ── ÉTAPE 8 : Nettoyage TEST ─────────────────
  cleanup-test:
    needs: deploy-prod
    runs-on: [self-hosted, runner-test]
    steps:
      - name: Supprimer APK du TEST
        run: |
          rm -rf /srv/test/releases/*
          chmod 000 /srv/test/releases 2>/dev/null || true
          echo "APK retiré du TEST - disponible uniquement sur PROD"