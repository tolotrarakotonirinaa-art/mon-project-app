name: CI/CD Pipeline

on:
  push:
    branches:
      - staging

jobs:

  deploy-test:
    runs-on: self-hosted
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deployer sur TEST
        run: |
          mkdir -p /srv/test/releases
          chmod 755 /srv/test/releases
          cp -r $GITHUB_WORKSPACE/releases/* /srv/test/releases/ 2>/dev/null || true
          echo "Deploye sur TEST"

  validation-agent:
    needs: deploy-test
    runs-on: self-hosted
    environment:
      name: agent-approval
    steps:
      - run: echo "Agent a valide"

  extract:
    needs: validation-agent
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Creer archive
        run: |
          mkdir -p /srv/test/archives
          tar -czf /srv/test/archives/projet.tar.gz --exclude='.git' -C $GITHUB_WORKSPACE .
          ls -lh /srv/test/archives/

  cleanup-test:
    needs: extract
    runs-on: self-hosted
    steps:
      - name: Retirer APK du TEST
        run: |
          rm -rf /srv/test/releases/*
          chmod 755 /srv/test/releases
          echo "APK retire du TEST"

  validation-chef:
    needs: cleanup-test
    runs-on: self-hosted
    environment:
      name: production-approval
    steps:
      - run: echo "Chef a approuve"

  deploy-prod:
    needs: validation-chef
    runs-on: self-hosted
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deployer sur PROD
        run: |
          mkdir -p /srv/releases
          chmod 755 /srv/releases
          cp -r $GITHUB_WORKSPACE/releases/* /srv/releases/ 2>/dev/null || true
          echo "Deploye sur PROD"