name: CI/CD Pipeline

on:
  push:
    branches:
      - staging

jobs:

  # ── TEST ──
  deploy-test:
    runs-on: [self-hosted, runner-test]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Déployer sur TEST
        run: |
          mkdir -p /srv/test/releases
          chmod 755 /srv/test/releases
          cp -r $GITHUB_WORKSPACE/releases/* /srv/test/releases/ 2>/dev/null || true
          echo "Application disponible sur http://192.168.137.68:8080/releases/"

  # ── VALIDATION AGENT ──
  validation-agent:
    needs: deploy-test
    runs-on: [self-hosted, runner-test]
    environment:
      name: agent-approval
    steps:
      - run: echo "Agent a validé l'application sur TEST"

  # ── EXTRACTION ──
  extract:
    needs: validation-agent
    runs-on: [self-hosted, runner-test]
    steps:
      - uses: actions/checkout@v4

      - name: Créer archive
        run: |
          VERSION=$(date +%Y%m%d-%H%M%S)
          tar -czf /tmp/projet-v$VERSION.tar.gz \
            --exclude='.git' \
            -C $GITHUB_WORKSPACE .

      - name: Publier archive
        uses: actions/upload-artifact@v4
        with:
          name: projet-valide
          path: /tmp/projet-v*.tar.gz
          retention-days: 30

  # ── CLEAN TEST ──
  cleanup-test:
    needs: extract
    runs-on: [self-hosted, runner-test]
    steps:
      - name: Retirer APK du TEST
        run: |
          rm -rf /srv/test/releases/*
          chmod 000 /srv/test/releases 2>/dev/null || true
          echo "APK retiré du TEST"

  # ── VALIDATION CHEF ──
  validation-chef:
    needs: cleanup-test
    runs-on: [self-hosted, runner-test]
    environment:
      name: production-approval
    steps:
      - run: echo "Chef de projet a approuvé le déploiement en PROD"

  # ── DEPLOY PROD ──
  deploy-prod:
    needs: validation-chef
    runs-on: [self-hosted, tolotra-VirtualBox]
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: projet-valide

      - name: Déployer sur PROD
        run: |
          mkdir -p /srv/releases
          chmod 755 /srv/releases

          # Extraction archive
          tar -xzf projet-valide/*.tar.gz -C /srv/releases 2>/dev/null || true

          echo "Application accessible sur http://192.168.137.153/releases/"