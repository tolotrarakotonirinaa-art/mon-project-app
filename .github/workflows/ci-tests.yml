name: CI - Tests automatiques

on:
  pull_request:
    branches:
      - develop
      - staging

jobs:

  tests:
    runs-on: [self-hosted, runner-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Installer les dépendances
        run: |
          cd $GITHUB_WORKSPACE
          npm install

      - name: Lancer les tests
        run: |
          cd $GITHUB_WORKSPACE
          npm test -- --watchAll=false

      - name: Vérifier le build
        run: |
          cd $GITHUB_WORKSPACE
          npm run build
          echo "Build réussi ✅"
```

---

### Le flux collaboratif complet
```
Dev 1 → feature/frontend → Pull Request → develop
Dev 2 → feature/backend  → Pull Request → develop
Dev 3 → feature/database → Pull Request → develop
        ↓
GitHub Actions lance les tests automatiquement
        ↓
Si tests OK → merge autorisé dans develop
        ↓
Tech Lead merge develop → staging
        ↓
deploy-test automatique sur VM ubuntu (TEST)
        ↓
Vérification sur http://10.0.2.15:8080
        ↓
APPROVE → deploy-prod sur VM Ubuntu12 (PROD)
        ↓
APK supprimé du TEST automatiquement
        ↓
Client accède sur http://10.0.2.15:80